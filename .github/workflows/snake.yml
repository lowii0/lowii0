# .github/workflows/snake.yml
# Generates the contribution-graph snake in black & white.
# Commit this to your lowii0/lowii0 repo at: .github/workflows/snake.yml

name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # lets you run it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate snake svg (monochrome)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=000000
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=ffffff&color_dots=151515,3a3a3a,6e6e6e,a8a8a8,ffffff

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
